<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Bridge - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navigation Bar -->
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Skill Bridge</a>
            <div class="navbar-nav ms-auto flex-row gap-3 align-items-center">
                <a class="nav-link text-white" href="{% url 'home' %}">Home</a>
                <a class="nav-link text-white" href="{% url 'jobs' %}">Find Jobs</a>
                <a class="nav-link text-white" href="{% url 'post_gig' %}">Post a Gig</a>
                
                <div class="ms-2 d-flex gap-2">
                    <a class="btn btn-outline-light px-3" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-primary px-3" href="{% url 'signup' %}">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Main Content Area: Sign Up Form -->
    <div class="container mt-5 pt-3">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0 p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Join Skill Bridge</h2>
                        <p class="text-muted">Create an account to connect with your local community.</p>
                    </div>
                    
                    <!-- Smoke & Mirrors: Form submission redirects to the dashboard -->
                    <form onsubmit="event.preventDefault(); alert('Account Created! Welcome to Skill Bridge.'); window.location.href='{% url 'jobs' %}';">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">First Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Joel" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Last Name</label>
                                <input type="text" class="form-control" placeholder="e.g. Joseph" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="tel" class="form-control" pattern="[0-9]{10}" placeholder="10-digit number" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" placeholder="Create a strong password" required>
                        </div>

                        <!-- Account Type Selection -->
                        <label class="form-label fw-bold mt-2">I want to use Skill Bridge to:</label>
                        <div class="d-flex gap-3 mb-4">
                            <div class="form-check border rounded p-2 flex-fill text-center bg-white">
                                <input class="form-check-input float-none ms-0 mb-2" type="radio" name="accountType" id="findWork" required>
                                <label class="form-check-label d-block text-muted" for="findWork">Find Work</label>
                            </div>
                            <div class="form-check border rounded p-2 flex-fill text-center bg-white">
                                <input class="form-check-input float-none ms-0 mb-2" type="radio" name="accountType" id="hireHelp" required>
                                <label class="form-check-label d-block text-muted" for="hireHelp">Hire Help</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold mb-3">Create Account</button>
                        
                        <div class="text-center">
                            <p class="mb-0">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none">Log in</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

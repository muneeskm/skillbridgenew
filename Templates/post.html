<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Bridge - Post a Gig</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navigation Bar -->
    <!-- Navigation Bar -->
   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Skill Bridge</a>
            <div class="navbar-nav ms-auto flex-row gap-3 align-items-center">
                <a class="nav-link text-white" href="{% url 'home' %}">Home</a>
                <a class="nav-link text-white" href="{% url 'jobs' %}">Find Jobs</a>
                <a class="nav-link text-white" href="{% url 'post_gig' %}">Post a Gig</a>
                
                <div class="ms-2 d-flex gap-2">
                    <a class="btn btn-outline-light px-3" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-primary px-3" href="{% url 'signup' %}">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area: The Form -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 p-4">
                    <h2 class="fw-bold mb-4 text-center">Need help? Post it here.</h2>
                    
                    <!-- Smoke & Mirrors: The onsubmit logic fakes a database submission -->
                  <form method="POST" action="{% url 'post_gig' %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Job Title</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g., Fix a leaky sink" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Detailed Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Describe what you need help with..." required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Hourly Rate (₹)</label>
                                <input type="number" name="hourly_rate" class="form-control" min="1" placeholder="e.g., 300" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Your Phone Number</label>
                                <input type="tel" name="phone_number" class="form-control" pattern="[0-9]{10}" placeholder="10-digit number" required>
                            </div>
                        </div>

                        <div class="form-check mb-4 mt-2 p-3 bg-light rounded border">
                            <input class="form-check-input ms-1" type="checkbox" id="boostPost">
                            <label class="form-check-label ms-2 fw-bold text-primary" for="boostPost">
                                🚀 Boost this post to the top for ₹50 (Pay later)
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Post Gig Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Bridge - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navigation Bar -->
    <!-- Navigation Bar -->
 <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Skill Bridge</a>
            <div class="navbar-nav ms-auto flex-row gap-3 align-items-center">
                <a class="nav-link text-white" href="{% url 'home' %}">Home</a>
                <a class="nav-link text-white" href="{% url 'jobs' %}">Find Jobs</a>
                <a class="nav-link text-white" href="{% url 'post_gig' %}">Post a Gig</a>
                
                <div class="ms-2 d-flex gap-2">
                    <a class="btn btn-outline-light px-3" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-primary px-3" href="{% url 'signup' %}">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>
    <!-- Main Content Area: Login Form -->
    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p class="text-muted">Sign in to find work or hire help locally.</p>
                    </div>
                    
                    <!-- Smoke & Mirrors: The form submission redirects to the job board -->
                    <form onsubmit="event.preventDefault(); alert('Login successful! Welcome back to Skill Bridge.'); window.location.href='{% url 'jobs' %}';">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Phone Number or Email</label>
                            <input type="text" class="form-control form-control-lg" placeholder="Enter your details" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control form-control-lg" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold mb-3">Sign In</button>
                        
                        <div class="text-center">
                            <p class="mb-0">Don't have an account? <a href="{% url 'signup' %}" class="text-primary text-decoration-none">Sign up here</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
